# capabilities-ground-truth.yaml
# The claim bank. Every factual claim in zeststream.ai copy must match an entry here.
# This file is THE 2026-04-19 pivot's permanent fix — S.CAPABILITIES stock.
#
# RULES:
# 1. Every entry MUST have: id, claim, canonical_phrasing, source.{type,location,timestamp}
# 2. Append-only for historical accuracy. Deprecate with `deprecated_at` field; never delete.
# 3. If a claim needs to appear in copy and has no entry here, STOP and add the entry with evidence. No exceptions.
# 4. stale_after_days triggers a warning on scorer runs; doesn't block. Manual refresh.
#
# SOURCE TYPES:
#   benchmark — direct measurement, reproducible
#   api_pull — live API query, results attached
#   repo_link — code/config in a git repo
#   timestamped_log — log line with timestamp and service
#   client_authorized — written client approval to cite
#   vendor_public_pricing — vendor's own public pricing page (retrieved date matters)
#   commitment — stated past-tense capability with supporting receipt

