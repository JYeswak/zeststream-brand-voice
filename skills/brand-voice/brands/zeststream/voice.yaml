# ZestStream brand voice — machine-checkable constants
# The enforceable core. Changes to this file ripple to every scorer, probe, and prompt.
# Version this file in git. Never edit on a running CI job.

brand:
  slug: zeststream
  name: ZestStream
  operator: "Joshua Nowak"
  operator_variants_banned: ["Josh", "Josh Nowak"]  # trauma 2026-04-19: canonical is always Joshua
  domain: "zeststream.ai"
  source_of_truth: "/Users/josh/Developer/zesttube/.planning/capabilities-brief.md"
  ground_truth: "/Users/josh/.claude/skills/zeststream-brand-voice/data/capabilities-ground-truth.yaml"

# ============================================================================
# CANON — verbatim, never paraphrased
# ============================================================================
canon:
  primary: "I help SMB owners buy their time back."
  variants_approved:
    - "I help SMB owners buy their Tuesdays back."
    - "I am Joshua. I build things that work."
    - "Most consultants hand you a slide deck and leave. I hand you a working system."
  rule: "Primary canon appears verbatim at least once per top-level route. Variants allowed on /about opener."
  # DEMOTED 2026-04-21 per .planning/brand-voice-cli/08-canon-migration.md:
  # "I build things that work, and I show you the receipt." — now an operating principle, not canon.
  # The receipt RULE (every claim has a receipt) is preserved via receipt_shown dim, three_moves.show_receipt,
  # and claims_ungrounded grounding layer — all UNCHANGED.

method:
  name_full: "Peel. Press. Pour.™"
  name_registered: "The Yuzu Method ®"
  phases:
    peel:
      duration: "Week 1 (5 business days)"
      role: "Discovery"
      japanese_root: "3 Mus (Muri overwork / Muda waste / Mura inconsistency)"
      milestone_quote: "We finally see what's actually happening in our operations."
    press:
      duration: "Weeks 2–8"
      role: "Build"
      japanese_root: "Monozukuri (craftsmanship)"
      milestone_quote: "We're already saving 15+ hours per week, and the main system isn't even done yet."
    pour:
      duration: "Launch + ongoing"
      role: "Deploy + optimize (kaizen)"
      japanese_root: "Kaizen (continuous improvement)"
      milestone_quote: "We're running 85% automated, and we know exactly how to improve the rest."
  phase_not_gate: true  # Never conflate phases with the 5 gates (TESTABLE/SECURE/FUN/VALUABLE/EASY)

# ============================================================================
# IDENTITY POSTURE
# ============================================================================
posture:
  voice: "first-person singular"
  pronouns_allowed: ["I", "me", "my", "you", "your"]
  pronouns_banned: ["we", "our", "our team", "us"]  # ZestStream is Joshua solo
  permitted_exceptions:
    - context: "named prior-company collective action"
      example: "we sold the company"
      where_allowed: "origin_story_surfaces"
      rationale: "Joshua was part of the ZIRKEL collective when sold July 2024; 'we' is accurate there"
  attribution_rule: "Jeff Emanuel's work (NTM, Agent Mail, beads, CASS) always attributed. Meadows always cited."

# ============================================================================
# ATTRIBUTION RULES — machine-enforced (Session 14, 2026-04-19)
# These extend the posture.attribution_rule with per-tool regex enforcement.
# ============================================================================
attribution_rules:

  - id: jeff_emanuel_attribution_list
    upstream_author: "Jeff Emanuel (Dicklesworthstone)"
    tools:
      - NTM
      - ntm
      - mcp-agent-mail
      - Agent Mail
      - beads_rust
      - beads
      - CASS
    rule: "All tools in this list are Jeff Emanuel's work. Never attribute to Joshua. Always credit Dicklesworthstone."

  - id: openfang_deployed_not_built
    rule: "openfang copy must use 'deployed'/'run' language, never 'built'/'wrote'"
    trigger_regex: '\b(built|wrote|created|developed)\s+\w*openfang'
    action: auto_reject
    explanation: "openfang is RightNow-AI upstream. Joshua deployed it; he did not build it."

  - id: jeff_tools_not_joshua
    rule: "mcp-agent-mail, ntm, beads_rust attributed to Jeff Emanuel, never to Joshua"
    trigger_regex: '\b(built|wrote|created|developed)\s+\w*(mcp-agent-mail|ntm|beads_rust|beads|NTM|Agent Mail)'
    action: auto_reject
    explanation: "These are Jeff Emanuel (Dicklesworthstone) tools. Joshua: user/contributor. Not Joshua's IP."

  - id: wip_repos_not_public
    rule: "work_in_progress repos (cubcloud-bears, openclaw-smb) not mentioned on public surfaces"
    trigger_regex: '\b(cubcloud-bears|openclaw-smb)\b'
    action: auto_reject
    explanation: "Both repos have approved_for_public: false. Not on V1 site."

  - id: terratitle_frontend_caveat_required
    rule: "terratitle frontend claims require caveat or must narrow to backend/database only"
    trigger_regex: '\bterratitle\b.*\bfrontend\b|\bfrontend\b.*\bterratitle\b'
    action: flag_for_review
    explanation: "Backend/DB are 100% Joshua. Frontend: Joshua rebuilt from scratch but CubCloud-hired dev later contributed input. Claim must preserve caveat or narrow to backend-only."

  - id: cfs_not_arms_length
    rule: "CFS copy cannot frame engagement as arms-length cold client acquisition"
    trigger_regex: '\b(ClutterFreeSpaces|Clutter Free Spaces|CFS)\b.*(cold|arms.length|arms-length|first.contact|unknown|stranger)'
    action: auto_reject
    explanation: "Chanel disclosure policy: CFS relationship is not arms-length. This framing is inaccurate."

  - id: cubcloud_aaas_old_name_external
    rule: "External-facing copy must use 'Remy' not 'cubcloud-aaas'"
    trigger_regex: '\bcubcloud-aaas\b'
    action: auto_reject
    explanation: "cubcloud-aaas is the internal/historical name. Public name is Remy (remy.zeststream.ai). Internal YAML is exempt — this rule fires on copy surfaces only."
    context: "rename_date: 2026-04-19. previous_internal_names: [cubcloud-aaas]. Rationale: product is Joshua's ZestStream IP, not cubcloud-scope."

three_moves:
  mandatory_on_conversion_surfaces: true
  moves:
    - id: name_person
      rule: "Name Joshua (never faceless 'we', never 'Josh')"
    - id: show_receipt
      rule: "Show a number, repo link, benchmark, workflow count, SHA, or log line"
    - id: invite_not_pitch
      rule: "End with low-friction invitation (Peel session, map call, DM). Never 'Contact sales.'"

# ============================================================================
# BANNED WORDS — canonical consolidated list (resolves guidelines-vs-brief conflict)
# Lexical grep. `replace_all` pre-commit. Case-insensitive, word-boundary anchored.
# ============================================================================
banned_words:
  # Slide-deck consulting
  - enterprise
  - transformation
  - orchestration
  - platform
  - ecosystem
  - synergize
  - synergy
  - holistic
  - turnkey
  - "end-to-end"
  - "cutting-edge"
  - "state-of-the-art"
  - "best-in-class"
  - "next-generation"
  - "mission-critical"
  - paradigm
  # Consultant tells
  - handoff
  - artifact
  - stakeholder
  - deliverable
  - bandwidth
  - "circle back"
  - "touch base"
  - operationalize
  - actionable
  - alignment
  - "deep-dive"
  # AI/marketing slop
  - "harness the power"
  - revolutionize
  - "game-changing"
  - seamless
  - robust
  - "move the needle"
  - "boil the ocean"
  - "low-hanging fruit"
  - "at the end of the day"
  - utilize  # say "use"
  # Corporate filler
  - "we're excited to announce"
  - "proud to partner with"
  - "our mission is to"
  # Pronoun-specific (ZestStream only — Joshua solo)
  - "our team"
  - "ZestStream delivers"
  - "we built"
  - "we offer"

banned_phrases:
  - "Not just X but Y"
  - "It's not X, it's Y"
  - "In today's world"
  - "In an era of"
  - "empower" # verb form
  - "unlock" # verb form, metaphorical
  - "leverage" # verb form; noun allowed as in "leverage point"
  - "streamline" # verb form

# ============================================================================
# CLAIMS RULES — the 2026-04-19 pivot's permanent fix
# ============================================================================
claims:
  mode: "cite_or_omit"
  ungrounded_auto_reject: true
  vague_quantifier_auto_reject: true  # "roughly", "approximately", "about X%", "many clients"
  testimonial_without_name: reject
  capability_without_receipt: reject  # If no receipt exists, phrase as "I can wire this in"
  ground_truth_source: "../../data/capabilities-ground-truth.yaml"
  extraction:
    patterns:
      # Matches: "105 tok/s", "96 workflows", "23,188 chunks", "14 years", etc.
      - '\b\d[\d,]*\s*(?:tok/s|workflows?|chunks?|years?|hours?|weeks?|months?|days?|GPUs?|containers?|scripts?)\b'
      # Matches: "$5,000", "$15k", "$6-12k/mo"
      - '\$[\d,]+(?:k|K)?(?:/mo|/month|/hr|/yr)?'
      # Matches percentages
      - '\b\d+(?:\.\d+)?%'
      # Matches multipliers
      - '\b\d+(?:\.\d+)?×|\b\d+x improvement'
      # Explicit capability verbs
      - '\b(?:built|rebuilt|tuned|deployed|shipped|wired)\b'

# ============================================================================
# SURFACE RULES (tone-by-context matrix; closes §F gap)
# ============================================================================
surfaces:
  hero:
    sentence_max_words: 18
    paragraphs_max: 1
    register: "direct, confident, inviting"
    must_have: [canon_line_if_top_route, three_moves_compressed]
  body:
    sentence_max_words: 25
    paragraph_max_sentences: 3
    register: "builder-practical, technical-accessible"
  cta:
    sentence_max_words: 12
    register: "concrete action, low friction"
    max_per_page: 2
  email:
    sentence_max_words: 22
    signoff: "— Joshua"
    register: "warm-operator"
  post:  # LinkedIn, Twitter, long-form social
    sentence_max_words: 25
    register: "builder-practical with narrative hook"
    must_name_receipt: true
  meta:  # page meta descriptions, OG tags
    sentence_max_words: 20
    character_max: 160
    register: "declarative + specific"

audiences:
  operator:
    register_adjust: "+specificity, +technical, +receipts"
  candidate:
    register_adjust: "+credibility, +resilience-story, mentions Montana"
  customer:
    register_adjust: "+invitation, +low-friction, +Peel session"
  general:
    register_adjust: "default — builder-practical"

word_caps_per_route:
  "/": 600
  "/about": 1200
  "/consult": 1200
  "/yuzu-method": 1200
  "/methods/*": 1800  # essays can breathe
  default: 800

# ============================================================================
# TRADEMARK RENDERING (auto-reject if wrong)
# ============================================================================
trademarks:
  yuzu_method:
    first_use_per_asset: "The Yuzu Method ®"
    bare_ok_after_first_use: true
    never: ["The Yuzu Method", "Yuzu Method", "YUZU METHOD", "yuzu method"]  # bare
  motto:
    full: "Peel. Press. Pour.™"
    period_between_words: required
    tm_after: "Pour"
  phase_names:
    peel: "Peel"
    press: "Press"
    pour: "Pour"
    as_section_header: "PEEL|PRESS|POUR caps allowed"
  brand_names:
    joshua: "Joshua Nowak"
    never_joshua: ["Josh", "Josh Nowak", "J. Nowak", "J Nowak"]  # trauma 2026-04-20: block was inverted — was banning "Joshua"
    zeststream: "ZestStream"
    never_zeststream: ["Zeststream", "Zest Stream", "ZS", "zeststream"]
    the_gap: "The Gap"
    never_the_gap: ["the gap", "THE GAP"]  # except logo lockup

# ============================================================================
# RUBRIC — the 15-dim composite (resolves §B rubric conflict)
# Canonical: 15-dim composite hybrid scorer.
# The 8-criterion Yuzu-aware rubric from brand-voice-rubric-v2.md runs as a
# sub-check inside the `brand_voice` dim. See ALGORITHM.md §dim-brand_voice.
# ============================================================================
rubric:
  version: 3
  kind: composite_15_dim
  thresholds:
    banned_word_present: block
    composite_below_85: block
    composite_85_to_94: regen
    composite_ge_95: ship
    any_dim_below_9: block  # even a 96 composite blocks if a single dim <9
  weights:
    regex_pass: 0.15
    rules_pass: 0.20
    embedding_pass: 0.25
    llm_rubric_pass: 0.40
  dimensions:
    # The 5 Yuzu gates (≥95 each is the Josh-standard "no 90+ BS")
    - {id: testable, description: "Claims are verifiable; no untestable assertion"}
    - {id: secure, description: "No leaked secrets, no unsafe redirects, no bypassable guards in copy"}
    - {id: fun, description: "Reads well; rhythm; concrete verbs; zero slog"}
    - {id: valuable, description: "Every paragraph teaches or states a capability"}
    - {id: easy, description: "Plain-language; jargon always paired with analogy"}
    # The 10 voice-specific dims
    - {id: brand_voice, description: "Runs Rubric-B 8-criterion Yuzu-aware sub-check (mission-aligned, partnership-framed, attributed, operator-language, honest-tier, demo-proof, soft-CTA, Yuzu-mapped)"}
    - {id: canon_present, description: "Canon line present on top-level route; absent OK on internal pages"}
    - {id: person_named, description: "Joshua Nowak named explicitly (not 'Josh', not 'the team', not 'we')"}
    - {id: receipt_shown, description: "Concrete receipt appears (number, repo, SHA, workflow count)"}
    - {id: invite_not_pitch, description: "CTA is an invitation, not a sales pitch"}
    - {id: yuzu_phase_mapped, description: "Conversion pages explicitly name Peel/Press/Pour"}
    - {id: plain_language, description: "No bureaucratic or hedging phrasing"}
    - {id: specificity, description: "Passes the swap test (can't swap competitor name)"}
    - {id: rhythm, description: "Sentence-length variation; no three-part rhythmic lists"}
    - {id: friction_calibrated, description: "Tone matches surface × audience × phase per TONE_MATRIX.md"}

# ============================================================================
# EXEMPLAR / TRAUMA POLICY
# ============================================================================
exemplars:
  storage: "exemplars/<surface>/<slug>.md"
  promote_threshold: 98
  aging_hours: 48
  quarantine_threshold_on_reaudit: 90
  rag_collection: "brand_voice_exemplars_zeststream"
  qdrant_port: 6433
  qdrant_volume: "qdrant_ks_data"
  embedder: "nomic-embed-text"  # via Ollama local
  embed_dim: 768
  dedup_cosine_threshold: 0.92

trauma:
  storage: "trauma.jsonl"
  append_only: true
  schema:
    fields: [ts, text, surface, composite, banned_words, dims, regen_hints, fix_applied, recurrence_count]
  promote_to_rule_at_recurrence: 3

# ============================================================================
# LOGGING
# ============================================================================
logging:
  scorecard_jsonl: ".planning/scorecard-log.jsonl"  # relative to repo root
  schema:
    fields: [ts, route, surface, audience, phase, composite, dims, banned_words, claims_ungrounded, source, tick]

# ============================================================================
# INTEGRATION POINTS
# ============================================================================
integration:
  scorer_api: "http://localhost:7731/score"  # planned
  pre_commit_hook: ".ops/voice-lint.sh"  # planned
  prod_probe: ".ops/voice-reach-check.sh"  # planned, sibling to prod-reach-check.sh
  ecosystem_stocks: ".ecosystem/cron_stocks.json"
  drift_window_key: "voice_drift_ticks_window"
  drift_block_threshold: 3  # ≥3/10 ticks → write .ecosystem/STOP

# ============================================================================
# NEVER / ALWAYS — one-line invariants
# ============================================================================
invariants:
  never:
    - "Claim frontier-model novelty"
    - "Claim beginner status"
    - "Promise a hours-saved or revenue-lift number I can't measure in the client's stack"
    - "Quote Josh-standard '95+ on EVERYTHING' out of deliverable-gate context"
    - "Use 'Pour' as a verb ('Pour the handoff' etc.)"
    - "Use em-dash as dramatic pause in body copy"
    - "Three-part rhythmic list ('efficient, scalable, and reliable')"
    - "Decorative citrus metaphor without Yuzu grounding"
    - "Enemy framing of competitors or consultants"
    - "Doomer/apocalyptic framing about AI"
  always:
    - "Cite every number"
    - "Name Josh on conversion pages"
    - "Render Peel. Press. Pour.™ with periods and ™"
    - "Render The Yuzu Method ® on first use per asset"
    - "Append to scorecard-log.jsonl on every ship"

