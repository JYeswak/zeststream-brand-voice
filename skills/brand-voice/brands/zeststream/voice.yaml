# ============================================================================
# ICP QUALIFIERS — who to work with, who to route away
# Derived from 2026-04-19 interview. Every /consult page copy must reflect these.
# ============================================================================
icp_qualifiers:
  lean_forward_signals:
    - id: tools_failed_to_stick
      signal: "'I've tried three tools and none of them stuck'"
      why: "Understands the problem is process, not tooling. Has earned the insight."
    - id: decision_maker_present
      signal: "Named decision-maker in the conversation"
      why: "Participation requires authority. No authority, no participation."
  lean_back_signals:
    - id: we_without_owner
      signal: "'We' used without naming the actual decision-maker"
      why: "Shopping for a vendor, not a partner. Usually dies in week 2."
    - id: install_the_tool
      signal: "'I just need someone to install [ChatGPT/n8n/whatever] for my team'"
      why: "Below substance threshold. Can do it at rate if they pay, but not the work."
    - id: spreadsheet_only
      signal: "Engagement reduces to spreadsheet work"
      why: "Capable with spreadsheets, but it's not a big enough challenge. Not the work Joshua does."
    - id: below_price_floor
      signal: "Budget under $3k or unwilling to commit $100-$175/hr"
      why: "Hasn't been burned enough to respect the process."
  non_negotiables:
    - id: participation
      rule: "Joshua can't build in isolation. Daily ops rewrite requires client engagement."
    - id: velocity
      rule: "Joshua moves fast. Waiting on responses kills momentum and the engagement."
    - id: value_recognition
      rule: "Client must have already concluded cheap shortcuts cost more than the fix."
  hidden_qualifier: "We work with people who've already been burned enough to respect the process. The $3-$5k floor isn't really about money — it's whether they've had the lesson yet."

