    primary_peel: "#CEE741"    # yuzu yellow-green
    leaf_stem: "#6B8E23"       # sage deep green
    clothing: "#F5F0E1"        # cream / canvas natural
    text_structural: "#1A1B1F" # deep ink black (slightly warm)
    warm_accent: "#E8A94B"     # amber / golden hour
    env_plants: "#5B7553"      # forest sage
    never:
      - "corporate-saas-blue (#4169E1 range)"
      - "pure magenta"
      - "cyberpunk cyan"
      - "neon purple gradient"

  typography:
    # Ground-truth from zeststream-v2-fresh/src/app/layout.tsx lines 2, 21-33
    # Canonical production font pair. Never substitute without updating both repos.
    display:
      family: "Geist"
      source: "next/font/google"
      css_var: "--font-geist-sans"
      weights: [400, 500, 600, 700]
      tracking_display: -0.02em  # tight for hero text, loosen for body
      use_for: ["hero headlines", "section titles", "marketing copy", "image text overlays"]
    body:
      family: "Geist"
      css_var: "--font-geist-sans"
      weights: [400, 500]
      tracking_body: 0
      use_for: ["paragraph text", "UI labels", "form copy"]
    mono:
      family: "Geist Mono"
      source: "next/font/google"
      css_var: "--font-geist-mono"
      weights: [400, 500]
      use_for: ["code blocks", "receipts and scorecards (brand 'receipt-shown' motif)", "terminal output in screenshots"]
    loading:
      display: "swap"  # show fallback immediately, swap on load
      subsets: ["latin"]
      preload: true
    fallbacks:
      sans: "ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
      mono: "ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace"
    # Text-overlay rules for Yuzu mascot images (Midjourney/Grok Imagine cannot
    # render text reliably — overlay post-generation via Figma/canvas API)
    image_text_overlay:
      always_post_generation: true  # never ask the generator to bake text in
      headline_max_chars: 60
      contrast_ratio_min: 4.5  # WCAG AA on any tile over the image
      position_preference: ["bottom-left-quarter", "upper-third-centered"]
      banned:
        - "Comic Sans, Papyrus, Impact (any decorative or joke fonts)"
        - "Any font not in the Geist family"
        - "All-caps over >4 words (fatiguing)"
        - "Script or handwriting overlays"
      yuzu_method_trademark_overlay:
        first_use_text: "The Yuzu Method ®"
        motto_overlay: "Peel. Press. Pour.™"
        rendering_rule: "always render the registered-symbol ® on first appearance, ™ after 'Pour'"

  scene_pattern:
    rule: "Yuzu always does the thing the repo/tool does. Work IS the image."
    phase_encoding:
      peel:
        description: "Discovery, research, audit. Early morning / dawn light."
        settings: ["greenhouse", "kitchen workbench", "forest edge"]
        activities: ["peeling fruit", "inspecting with magnifier", "reading scroll", "examining receipts"]
        reference: "visual/scenes/peel_phase_discovery.jpg"
      press:
        description: "Build, construct, transform. Midday workshop light."
        settings: ["workshop", "lab", "workbench with tool pegboard"]
        activities: ["operating press/tool", "assembling", "stamping receipts"]
        reference: "visual/scenes/press_phase_workbench.jpg"
      pour:
        description: "Deliver, ship, complete. Golden hour light."
        settings: ["finish table", "barn doorway", "counter"]
        activities: ["pouring yuzu-green liquid", "stamping SHIPPED", "presenting receipt"]
        reference: "visual/scenes/pour_phase_delivery.jpg"

  surface_outputs:
    repo_hero:
      aspect: "16:9"
      dimensions: "1200x630 minimum"
      filename_pattern: "yuzu_[repo-slug]_hero.jpg"
      location: "repo root"
      uses: ["README hero image", "GitHub social preview card (OG image)"]
    repo_avatar:
      aspect: "1:1"
      dimensions: "460x460"
      filename_pattern: "yuzu_[repo-slug]_avatar.jpg"
      location: "repo root"
      uses: ["GitHub repo avatar"]
    explainer_banner:
      aspect: "16:9"
      dimensions: "1920x1080"
      reference: "visual/scenes/yuzu_method_explainer.jpg"
      uses: ["/consult page hero", "about page", "voice-coach skill README"]

  generation_workflow:
    primary_tool: "Grok Imagine (session 15 validated)"
    secondary_tools: ["Midjourney with --cref", "Leonardo.ai Character Reference", "Flux + IP-Adapter"]
    prompt_template: |
      Operator Yuzu character — yuzu citrus fruit head with ONE green leaf,
      emerald-green eyes with quiet competent smile, cream henley with rolled
      sleeves under canvas apron, wood-handled clipboard. Scene: [REPO-SPECIFIC].
      In the scene: [TOOL-OUTPUTS as floating 3D objects or monitors].
      3D Pixar-quality CG, subsurface scattering on the peel,
      [PEEL dawn | PRESS midday | POUR golden hour] lighting.
      Palette: yuzu yellow-green #CEE741, cream, warm amber, sage green,
      deep ink black. 16:9 aspect ratio.
    midjourney_flags: "--ar 16:9 --stylize 200 --v 6 --style raw --cref [canonical_url] --cw 100"

  validation_checklist:
    # Apply as STEP 0 before grading any visual artifact
    - "ONE leaf on head (not two or three)"
    - "Emerald-green eyes (not black, not blue)"
    - "Canvas apron + cream henley + rolled sleeves"
    - "Operator expression (not chibi-cheerful, not stern)"
    - "Palette compliance (no corp blue, no neon)"
    - "3D Pixar rendering (not flat/photo/painterly)"
    - "Wood-handled clipboard visible or in scene context"
    - "Warm lighting (never cyberpunk)"

  session_15_asset_bank:
    # Shippable assets generated this session, already canonical
    canonical_reference: "visual/yuzu_canonical.jpg"
    github_profile_avatar: "visual/yuzu_avatar_square.jpg"
    scenes:
      - use: "zeststream-brand-voice repo hero (Sat 4/26 launch image)"
        file: "visual/scenes/zeststream_brand_voice_hero.jpg"
      - use: "PEEL phase template / discovery repos"
        file: "visual/scenes/peel_phase_discovery.jpg"
      - use: "PRESS phase template / build-tooling repos"
        file: "visual/scenes/press_phase_workbench.jpg"
      - use: "POUR phase template / launch-delivery repos"
        file: "visual/scenes/pour_phase_delivery.jpg"
      - use: "Yuzu Method explainer banner / /consult / about pages"
        file: "visual/scenes/yuzu_method_explainer.jpg"
