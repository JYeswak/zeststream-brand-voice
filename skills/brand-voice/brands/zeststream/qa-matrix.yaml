  - id: t1_what_is_the_yuzu_method
    tier: T1_top_of_funnel
    question_variants:
      - What is Yuzu Method?
      - Your process?
      - Methodology?
      - Framework?
      - Peel Press Pour?
    canonical_answer: |
      The Yuzu Method is how Joshua runs every project. Three stages — Peel, Press, Pour — but the names matter less than what they mean.

      Peel is the discovery week. Joshua looks for three things borrowed from lean manufacturing — muri, mura, muda — overburden, unevenness, and waste. Those are the leaks in your operation. Press is the build — designing and shipping the fix. Pour is launch plus kaizen — a Japanese word that just means continuous improvement. It's the quiet work of watching how the build runs, catching what breaks, and making it better over time.

      The whole thing is named after the yuzu fruit — a Japanese citrus that takes ten-plus years to bear fruit from seed. Slow to grow, sharp when it lands. That's the philosophy: don't rush past the thinking part, don't skip the cleanup. Build it once, build it right. Peel session is the free way to see if the method fits your problem.
