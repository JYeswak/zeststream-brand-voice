    canonical_answer: |
      Short answer — no, your data isn't training anyone's model. When Joshua uses the major AI providers — Anthropic, OpenAI, xAI, Google — API access runs under terms where your data isn't used for training by default. He also doesn't sell or share client data with anyone, ever.

      For anything genuinely sensitive — medical, legal, financial, internal HR — there's a sovereign-AI option through the CubCloud partnership. Data never leaves a Montana-based GPU rack. Your information stays yours, on-prem, no cloud round-trip.

      If privacy is the first question, that's a great sign you're thinking right. Joshua will walk through exactly what touches what on the Peel session, before a single system is connected.
