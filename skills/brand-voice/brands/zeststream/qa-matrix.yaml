    canonical_answer: |
      Peel Report is one week, fixed. Past that, it depends on what Joshua is building.

      Demos and MVPs usually land in weeks or less. A working prototype you can click, show a team, or test internally — that's fast. Custom builds with real databases, custom front ends, role-based access — those take weeks to a few months, because that's real engineering and he won't fake it.

      The other timeline variable is third-party approvals — Google's app verification can take several weeks, Meta's app review takes time, Apple's store reviews move when they move. None of that is in anyone's control, so Joshua plans around it and keeps you moving on other parts of the build while queues run.

      Joshua gives you a real estimate at the end of the Peel, with the waiting-on-vendors pieces called out separately so nothing feels like it stalled.
