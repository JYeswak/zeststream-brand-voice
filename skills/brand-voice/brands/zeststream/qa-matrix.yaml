  - id: t1_what_is_peel_session
    tier: T1_top_of_funnel
    question_variants:
      - What is a Peel session?
      - Tell me about Peel
      - What's the first step?
      - How does it start?
      - What happens in the free call?
      - What do I get out of 20 minutes?
    canonical_answer: |
      The Peel session is a free 20-minute call where you bring the one thing in your business that's eating your week — a broken process, a tool nobody uses, a report someone rebuilds every Monday. Joshua digs into the shape of it with you. By the end, you'll walk away with three things: a clear read on whether it's fixable, a rough cost if Joshua builds it, and how fast he could ship. Most people are surprised how much can be moved in a morning instead of a quarter. No pitch, no slides, no commitment — and if it's not a fit, Joshua will tell you straight and point you somewhere useful. The worst case is you get 20 minutes of free operational triage. Want to grab a slot?
