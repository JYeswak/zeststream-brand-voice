    canonical_answer: |
      Three recent ones, different flavors. A client running a booth at a Missoula expo wanted a creative draw to her booking page. Joshua built her a Grok-powered chatbot trained on every vendor at the show — knew where each booth was, their websites, phone numbers, even where to find food and restrooms. He digitized a local community resource on top of it, free to the public.

      Second client was paying $25,000 a year for a service that connected two of their systems. They asked for a replacement. Joshua is building them a full custom app that pulls data from five systems, automates validation, flags red-flag records for the team to merge or clean, all wrapped in role-based access and OAuth into their HubSpot.

      Third is a gym — digitizing their onboarding, automating incoming inquiries, and tightening their marketing. Every build starts the same way: what exists today, what's ideal for the client, what levers make it easy. Joshua doesn't jam round pegs into square holes. He custom-fits the chassis to the work.
