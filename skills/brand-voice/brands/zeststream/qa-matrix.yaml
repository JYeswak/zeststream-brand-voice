  - id: t1_what_is_peel_report
    tier: T1_top_of_funnel
    question_variants:
      - What is the Peel Report?
      - What's included in the $500 deliverable?
      - What do I get from Peel?
      - Peel output?
      - What's the $500 for?
    canonical_answer: |
      One week. $500 fixed. Joshua walks your systems with you, interviews two or three people on the team who actually run the process, and writes you a report by Friday — the biggest time leaks named and ranked, with a rough cost to fix each one.

      Most people ask why not do this in-house. Your team's already buried — pulling them off real work to audit the work is how you get a half-finished doc nobody reads. They also haven't spent 25 years watching operations break the same six ways, so they can't tell in five minutes which fixes compound and which eat a quarter. And an outside read is cleaner — no one's protecting the last thing they built.

      Honest note — $500 is loss-leader pricing while Joshua is building the system. Every report becomes a template for the next one, so the work gets faster. Early clients get senior-operator work at a rate that won't last. Grab a slot if the timing's right.
    register: lay_audience
  - id: t1_what_kind_of_results
    tier: T1_top_of_funnel
    question_variants:
      - What kind of results do you deliver?
      - What do clients get?
      - Typical outcomes?
      - What changes for clients?
      - What will I get?
    canonical_answer: |
      Most of Joshua's clients show up with a pile of messy data and systems that don't talk to each other. If you've got all your ducks in a row, congrats — most people don't, and that's why he's here.

      The first stages are always cleanup and flow. Automating email-to-CRM entry. Customizing reply templates. Building a database that links the systems you've already paid for. Nothing flashy — just the plumbing that should have been there from the start.

      The slowest part is usually vendor credentials — some take days, some take weeks to get back, which is often the longest hold-up. Once past that, hours start vanishing from people's weeks. Teams get back time for the needle-turning work they're actually hired for. If you're running solo — you start enjoying dinners again.
