    question_variants:
      - Who are you?
      - What's your background?
      - Who is Joshua Nowak?
      - Tell me about the founder
    canonical_answer: |
      Joshua Nowak. 25+ years in the operational trenches — started at 15, worked through finance, banking, energy, telecom, now AI. Graduated out of Michigan in '08, right as the auto industry collapsed, so he got out. Paid off six figures in student loans working three jobs, got his MBA while managing a team full-time. Spent 15 years in Steamboat Springs running operations at ZIRKEL — led the sale of the company in 2024 and took an equity payout. Lived out of a fifth wheel around Colorado and Texas for a year, landed in Montana end of last year. Works hard, plays hard, outdoor life. That's the short version — what do you want to dig into?
